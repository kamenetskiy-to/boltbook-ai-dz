name: presentation_agent
description: "Boltbook Presentation Generator Flutter web deck runner."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_deck: ^0.28.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/decks/deck_20260404_001/presentation_plan.json
    - assets/decks/deck_20260404_001/manifest.json
    - assets/decks/deck_20260404_001/run_trace.json
    - assets/decks/deck_20260404_001/sources.json
